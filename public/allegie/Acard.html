<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アレルギーサバイバル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans JP', sans-serif; background: #faf9f6; color: #1a1a1a; min-height: 100vh; }

.screen { max-width: 680px; margin: 0 auto; padding: 24px 20px 60px; }
.center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }

/* Title */
.title-emoji { font-size: 64px; margin-bottom: 12px; }
h1.game-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
.title-sub { font-size: 16px; color: #888; margin-bottom: 32px; font-family: 'DM Sans', sans-serif; }
.title-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

/* Buttons */
.btn { padding: 13px 28px; font-size: 15px; font-family: 'Noto Sans JP', sans-serif; font-weight: 600; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; border: none; }
.btn:hover { opacity: 0.82; }
.btn-dark { background: #1a1a1a; color: #faf9f6; }
.btn-outline { background: transparent; color: #1a1a1a; border: 1.5px solid #ccc; }
.btn-outline:hover { border-color: #1a1a1a; opacity: 1; }
.btn-red { background: #dc2626; color: #fff; }
.btn-green { background: #16a34a; color: #fff; }
.btn-sm { padding: 8px 16px; font-size: 13px; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* Rules */
.rules-box { background: #fff; border: 1px solid #e5e5e0; border-radius: 8px; padding: 24px 28px; margin-top: 24px; max-width: 560px; width: 100%; }
.rules-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; font-family: 'DM Sans', sans-serif; }
.rules-box ol, .rules-box ul { padding-left: 20px; font-size: 14px; line-height: 1.9; color: #444; }
.rules-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 8px; }
.rules-table th, .rules-table td { border: 1px solid #e5e5e0; padding: 6px 10px; text-align: center; }
.rules-table th { background: #f5f5f0; font-weight: 600; }

/* Setup */
.setup-box { background: #fff; border: 1px solid #e5e5e0; border-radius: 8px; padding: 32px 36px; width: 100%; max-width: 440px; }
.setup-box h2 { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
.setup-field { margin-bottom: 16px; }
.setup-field label { display: block; font-size: 13px; font-weight: 600; color: #888; margin-bottom: 6px; font-family: 'DM Sans', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; }
.setup-field input, .setup-field select { width: 100%; padding: 11px 14px; font-size: 15px; border: 1px solid #ccc; border-radius: 4px; outline: none; font-family: 'Noto Sans JP', sans-serif; transition: border-color 0.2s; }
.setup-field input:focus, .setup-field select:focus { border-color: #1a1a1a; }

/* Deal screen */
.deal-box { background: #fff; border: 1px solid #e5e5e0; border-radius: 8px; padding: 36px; width: 100%; max-width: 480px; text-align: center; }
.deal-private { font-size: 40px; margin-bottom: 12px; }
.deal-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.deal-sub { font-size: 14px; color: #888; margin-bottom: 28px; font-family: 'DM Sans', sans-serif; }

/* Section label */
.section-label { font-size: 11px; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; font-family: 'DM Sans', sans-serif; }

/* Allergy cards */
.allergy-card {
  display: inline-flex; flex-direction: column; align-items: center;
  padding: 12px 14px; border-radius: 8px; border: 1.5px solid;
  min-width: 100px; max-width: 120px; text-align: center;
  cursor: default;
}
.allergy-card .ac-emoji { font-size: 28px; margin-bottom: 4px; }
.allergy-card .ac-name { font-size: 12px; font-weight: 700; line-height: 1.3; margin-bottom: 4px; }
.allergy-card .ac-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; font-family: 'DM Sans', sans-serif; }
.cards-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 16px; }

/* HP bar */
.hp-bar-wrap { background: #e5e5e0; border-radius: 4px; height: 12px; overflow: hidden; margin-top: 6px; }
.hp-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s, background-color 0.5s; }
.hp-text { font-size: 22px; font-weight: 700; }
.hp-label { font-size: 11px; font-family: 'DM Sans', sans-serif; color: #aaa; text-transform: uppercase; margin-top: 2px; }

/* Player summary row */
.player-summary-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.player-chip { flex: 1; min-width: 120px; background: #fff; border: 1.5px solid #e5e5e0; border-radius: 6px; padding: 10px 14px; }
.player-chip.current { border-color: #1a1a1a; }
.player-chip.dead { opacity: 0.4; }
.chip-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.chip-hp { font-size: 18px; font-weight: 700; }

/* Env card */
.env-card {
  background: #eff6ff; border: 2px solid #3b82f6; border-radius: 10px;
  padding: 24px; text-align: center; margin-bottom: 20px;
}
.env-card.safe { background: #f0fdf4; border-color: #22c55e; }
.env-card.all { background: #fef3c7; border-color: #f59e0b; }
.env-emoji { font-size: 48px; margin-bottom: 10px; }
.env-name { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.env-detail { font-size: 14px; color: #666; margin-bottom: 12px; font-family: 'DM Sans', sans-serif; }
.env-effect { display: inline-block; padding: 4px 12px; background: #3b82f6; color: #fff; border-radius: 4px; font-size: 13px; font-weight: 700; font-family: 'DM Sans', sans-serif; }
.env-effect.safe { background: #22c55e; }
.env-effect.all { background: #f59e0b; }

/* Counter cards (hand) */
.counter-card {
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 10px; background: #f0fdf4; border: 2px solid #86efac;
  border-radius: 8px; min-width: 90px; max-width: 110px; text-align: center;
  cursor: pointer; transition: all 0.15s; position: relative;
}
.counter-card:hover { border-color: #16a34a; transform: translateY(-2px); }
.counter-card.selected { border-color: #16a34a; background: #dcfce7; box-shadow: 0 0 0 3px rgba(22,163,74,0.2); }
.cc-emoji { font-size: 26px; margin-bottom: 4px; }
.cc-name { font-size: 11px; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
.cc-desc { font-size: 10px; color: #666; font-family: 'DM Sans', sans-serif; line-height: 1.3; }
.cc-check { position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; background: #16a34a; border-radius: 50%; color: #fff; font-size: 11px; display: flex; align-items: center; justify-content: center; }

/* Damage preview */
.dmg-preview { background: #fff; border: 1px solid #e5e5e0; border-radius: 6px; padding: 14px 18px; margin-bottom: 16px; }
.dmg-preview .row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 14px; font-family: 'DM Sans', sans-serif; }
.dmg-preview .row.total { font-weight: 700; font-size: 16px; border-top: 1px solid #e5e5e0; margin-top: 6px; padding-top: 8px; }
.dmg-red { color: #dc2626; font-weight: 600; }
.dmg-green { color: #16a34a; font-weight: 600; }

/* Damage result */
.dmg-result { text-align: center; padding: 24px; background: #fff; border: 1px solid #e5e5e0; border-radius: 8px; margin-bottom: 20px; }
.dmg-big { font-size: 52px; font-weight: 700; line-height: 1; }
.dmg-big.bad { color: #dc2626; }
.dmg-big.good { color: #16a34a; }
.dmg-big.neutral { color: #888; }

/* Cure modal */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-box { background: #fff; border-radius: 10px; padding: 28px 32px; max-width: 420px; width: 100%; }
.modal-box h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

/* Log */
.log-box { background: #f5f5f0; border-radius: 6px; padding: 12px 16px; max-height: 120px; overflow-y: auto; margin-top: 16px; }
.log-entry { font-size: 13px; font-family: 'DM Sans', sans-serif; color: #666; padding: 2px 0; border-bottom: 1px solid #e5e5e0; }
.log-entry:last-child { border-bottom: none; }

/* Game over */
.gameover-box { text-align: center; max-width: 480px; width: 100%; }
.winner-emoji { font-size: 72px; margin-bottom: 16px; }
.winner-name { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.winner-sub { font-size: 16px; color: #888; margin-bottom: 32px; font-family: 'DM Sans', sans-serif; }
.final-scores { background: #fff; border: 1px solid #e5e5e0; border-radius: 8px; padding: 20px; margin-bottom: 28px; }

/* Ready screen */
.ready-box { text-align: center; max-width: 420px; width: 100%; padding: 40px 32px; background: #1a1a1a; border-radius: 12px; }
.ready-box .ready-emoji { font-size: 56px; margin-bottom: 16px; }
.ready-box .ready-name { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 8px; }
.ready-box .ready-sub { font-size: 14px; color: #aaa; margin-bottom: 28px; font-family: 'DM Sans', sans-serif; }

.hidden { display: none; }
.divider { border: none; border-top: 1px solid #e5e5e0; margin: 20px 0; }
.turn-badge { display: inline-block; background: #1a1a1a; color: #fff; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 4px; font-family: 'DM Sans', sans-serif; margin-bottom: 16px; }
.phase-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
.alert-box { padding: 12px 16px; border-radius: 6px; font-size: 14px; font-family: 'DM Sans', sans-serif; margin-bottom: 14px; }
.alert-box.dmg { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; }
.alert-box.safe { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: #aaa; text-decoration: none; margin-bottom: 20px; transition: color 0.2s; }
.back-link:hover { color: #1a1a1a; }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ===== DATA =====
const ALLERGY_CARDS = [
  { id:'a1',  name:'スギ花粉症',    emoji:'🌲', cat:'pollen', severity:'mild' },
  { id:'a2',  name:'スギ花粉症',    emoji:'🌲', cat:'pollen', severity:'mild' },
  { id:'a3',  name:'ブタクサ',      emoji:'🌾', cat:'pollen', severity:'mild' },
  { id:'a4',  name:'ブタクサ',      emoji:'🌾', cat:'pollen', severity:'mild' },
  { id:'a5',  name:'卵アレルギー',  emoji:'🥚', cat:'food',   severity:'mild' },
  { id:'a6',  name:'卵アレルギー',  emoji:'🥚', cat:'food',   severity:'mild' },
  { id:'a7',  name:'牛乳アレルギー',emoji:'🥛', cat:'food',   severity:'mild' },
  { id:'a8',  name:'牛乳アレルギー',emoji:'🥛', cat:'food',   severity:'mild' },
  { id:'a9',  name:'エビアレルギー',emoji:'🦐', cat:'food',   severity:'moderate' },
  { id:'a10', name:'エビアレルギー',emoji:'🦐', cat:'food',   severity:'moderate' },
  { id:'a11', name:'ナッツアレルギー',emoji:'🥜',cat:'food',  severity:'moderate' },
  { id:'a12', name:'ナッツアレルギー',emoji:'🥜',cat:'food',  severity:'moderate' },
  { id:'a13', name:'猫アレルギー',  emoji:'🐱', cat:'animal', severity:'moderate' },
  { id:'a14', name:'猫アレルギー',  emoji:'🐱', cat:'animal', severity:'moderate' },
  { id:'a15', name:'薬物アレルギー',emoji:'💊', cat:'drug',   severity:'severe' },
  { id:'a16', name:'薬物アレルギー',emoji:'💊', cat:'drug',   severity:'severe' },
  { id:'a17', name:'ハウスダスト',  emoji:'🏠', cat:'other',  severity:'mild' },
  { id:'a18', name:'ハウスダスト',  emoji:'🏠', cat:'other',  severity:'mild' },
];

const ENV_CARDS = [
  { id:'e1', name:'春の花粉大量飛散', emoji:'🌸', effects:[{cat:'pollen',dmg:2}], detail:'スギ花粉が大量飛散中' },
  { id:'e2', name:'春の花粉大量飛散', emoji:'🌸', effects:[{cat:'pollen',dmg:2}], detail:'スギ花粉が大量飛散中' },
  { id:'e3', name:'秋の雑草花粉',    emoji:'🍂', effects:[{cat:'pollen',dmg:2}], detail:'ブタクサが飛散中' },
  { id:'e4', name:'学校給食',        emoji:'🍽️', effects:[{cat:'food',dmg:2}],   detail:'卵・牛乳を使った料理' },
  { id:'e5', name:'パーティー',      emoji:'🎉', effects:[{cat:'food',dmg:2}],   detail:'ナッツやエビ料理が並ぶ' },
  { id:'e6', name:'ペットカフェ',    emoji:'🐾', effects:[{cat:'animal',dmg:3}], detail:'猫や犬がたくさん' },
  { id:'e7', name:'薬局実習',        emoji:'⚕️', effects:[{cat:'drug',dmg:2}],   detail:'様々な薬品に触れる' },
  { id:'e8', name:'安全な日',        emoji:'☀️', effects:[],                     detail:'何も起こらない穏やかな一日' },
  { id:'e9', name:'冬の乾燥',        emoji:'❄️', effects:[{cat:'all',dmg:1}],    detail:'乾燥で全員体調を崩す' },
];

const COUNTER_CARDS = [
  { id:'c1',  name:'病院治療',  emoji:'🏥', type:'heal',   value:5, desc:'体力 +5' },
  { id:'c2',  name:'病院治療',  emoji:'🏥', type:'heal',   value:5, desc:'体力 +5' },
  { id:'c3',  name:'薬局の薬',  emoji:'💊', type:'heal',   value:3, desc:'体力 +3' },
  { id:'c4',  name:'薬局の薬',  emoji:'💊', type:'heal',   value:3, desc:'体力 +3' },
  { id:'c5',  name:'マスク着用',emoji:'😷', type:'reduce', cat:'pollen', desc:'花粉ダメージ半減' },
  { id:'c6',  name:'マスク着用',emoji:'😷', type:'reduce', cat:'pollen', desc:'花粉ダメージ半減' },
  { id:'c7',  name:'食事制限',  emoji:'🚫', type:'nullify',cat:'food',   desc:'食物ダメージ無効' },
  { id:'c8',  name:'食事制限',  emoji:'🚫', type:'nullify',cat:'food',   desc:'食物ダメージ無効' },
  { id:'c9',  name:'緊急避難',  emoji:'🚨', type:'escape', desc:'全ダメージ無効（1ターン）' },
  { id:'c10', name:'緊急避難',  emoji:'🚨', type:'escape', desc:'全ダメージ無効（1ターン）' },
  { id:'c11', name:'免疫療法',  emoji:'⚕️', type:'cure',   desc:'アレルギー1つ完全治療' },
];

const SEV_MULT  = { mild:1, moderate:1.5, severe:2 };
const SEV_LABEL = { mild:'軽度', moderate:'中度', severe:'重度' };
const SEV_BG    = { mild:'#fef9c3', moderate:'#ffedd5', severe:'#fee2e2' };
const SEV_BORDER= { mild:'#f59e0b', moderate:'#ea580c', severe:'#dc2626' };
const SEV_TEXT  = { mild:'#92400e', moderate:'#c2410c', severe:'#991b1b' };
const CAT_LABEL = { pollen:'花粉', food:'食物', animal:'動物', drug:'薬物', other:'その他', all:'全員' };

// ===== STATE =====
let G = {};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startGame(names) {
  const allergyDeck  = shuffle([...ALLERGY_CARDS]);
  const envDeck      = shuffle([...ENV_CARDS]);
  const counterDeck  = shuffle([...COUNTER_CARDS]);

  const players = names.map(name => ({
    name, hp: 10, maxHp: 10,
    allergies: [], hand: [], isAlive: true,
  }));
  for (let i = 0; i < 3; i++)
    for (const p of players)
      if (allergyDeck.length) p.allergies.push(allergyDeck.pop());

  G = {
    phase: 'deal', dealIdx: 0, dealShowing: false,
    turn: 1, players,
    allergyDeck, envDeck, counterDeck,
    envDiscard: [], counterDiscard: [],
    currentEnvCard: null,
    roundQueue: [],
    currentPlayerIdx: 0,
    usedCards: [],
    pendingCure: false, pendingCureCardId: null,
    log: [],
  };
  render();
}

function drawCounter() {
  if (!G.counterDeck.length) { G.counterDeck = shuffle([...G.counterDiscard]); G.counterDiscard = []; }
  return G.counterDeck.length ? G.counterDeck.pop() : null;
}

function calcDmg(player, envCard, used) {
  if (!envCard || !envCard.effects.length) return 0;
  if (used.some(c => c.type === 'escape')) return 0;
  let total = 0;
  for (const eff of envCard.effects) {
    if (eff.cat === 'all') { total += eff.dmg; continue; }
    for (const a of player.allergies) {
      if (a.cat !== eff.cat) continue;
      let d = Math.ceil(eff.dmg * SEV_MULT[a.severity]);
      if (eff.cat === 'pollen' && used.some(c => c.type==='reduce' && c.cat==='pollen')) d = Math.ceil(d/2);
      if (eff.cat === 'food'   && used.some(c => c.type==='nullify' && c.cat==='food'))  d = 0;
      total += d;
    }
  }
  return total;
}

function calcHeal(used) {
  return used.reduce((s,c) => c.type==='heal' ? s+c.value : s, 0);
}

function hpColor(hp, max) {
  const pct = hp / max;
  if (pct > 0.5) return '#22c55e';
  if (pct > 0.25) return '#f59e0b';
  return '#ef4444';
}

// ===== ACTIONS =====
function ackDealReady() { G.dealShowing = true; render(); }

function ackDealDone() {
  G.dealIdx++;
  if (G.dealIdx >= G.players.length) revealEnv();
  else { G.dealShowing = false; render(); }
}

function revealEnv() {
  if (!G.envDeck.length) { G.envDeck = shuffle([...G.envDiscard]); G.envDiscard = []; }
  G.currentEnvCard = G.envDeck.length ? G.envDeck.pop() : null;
  G.roundQueue = G.players.filter(p => p.isAlive).map(p => p);
  G.phase = 'env_reveal';
  render();
}

function startPlayerTurns() {
  nextInQueue();
}

function nextInQueue() {
  if (!G.roundQueue.length) { endTurn(); return; }
  G.currentPlayerIdx = G.players.indexOf(G.roundQueue.shift());
  G.usedCards = [];
  G.phase = 'player_ready';
  render();
}

function startPlayerAction() {
  const p = G.players[G.currentPlayerIdx];
  if (calcDmg(p, G.currentEnvCard, []) > 0) {
    const card = drawCounter();
    if (card) { p.hand.push(card); }
  }
  G.usedCards = [];
  G.phase = 'player_action';
  render();
}

function toggleCard(cardId) {
  const p = G.players[G.currentPlayerIdx];
  const card = p.hand.find(c => c.id === cardId);
  if (!card) return;
  if (card.type === 'cure') { triggerCure(cardId); return; }
  const idx = G.usedCards.findIndex(c => c.id === cardId);
  if (idx >= 0) G.usedCards.splice(idx, 1);
  else G.usedCards.push(card);
  render();
}

function triggerCure(cardId) {
  G.pendingCure = true;
  G.pendingCureCardId = cardId;
  render();
}

function applyCure(allergyId) {
  const p = G.players[G.currentPlayerIdx];
  const ai = p.allergies.findIndex(a => a.id === allergyId);
  if (ai >= 0) p.allergies.splice(ai, 1);
  const hi = p.hand.findIndex(c => c.id === G.pendingCureCardId);
  if (hi >= 0) { G.counterDiscard.push(p.hand[hi]); p.hand.splice(hi, 1); }
  G.pendingCure = false; G.pendingCureCardId = null;
  addLog(`${p.name}がアレルギーを1つ治療！`);
  render();
}

function confirmTurn() {
  const p = G.players[G.currentPlayerIdx];
  const damage  = calcDmg(p, G.currentEnvCard, G.usedCards);
  const healing = calcHeal(G.usedCards);
  const net = healing - damage;
  p.hp = Math.min(p.maxHp, Math.max(0, p.hp + net));

  G.usedCards.forEach(c => {
    const hi = p.hand.findIndex(h => h.id === c.id);
    if (hi >= 0) { G.counterDiscard.push(p.hand[hi]); p.hand.splice(hi, 1); }
  });

  if (p.hp <= 0) {
    p.isAlive = false;
    addLog(`😵 ${p.name}が脱落！`);
  } else {
    addLog(`${p.name}: ${damage>0?'ダメージ-'+damage:''}${healing>0?' 回復+'+healing:''} → HP ${p.hp}`);
  }

  G.phase = 'player_damage';
  G._lastDamage = damage; G._lastHeal = healing;
  render();
}

function endTurn() {
  if (G.turn % 6 === 0) {
    for (const p of G.players) {
      if (!p.isAlive) continue;
      if (!G.allergyDeck.length) break;
      const card = G.allergyDeck.pop();
      p.allergies.push(card);
      addLog(`⚠️ ${p.name}に新アレルギー追加（${card.name}）`);
    }
  }
  G.envDiscard.push(G.currentEnvCard);
  G.turn++;

  const alive = G.players.filter(p => p.isAlive);
  if (alive.length <= 1) { G.phase='gameover'; G.winner=alive[0]||null; render(); return; }
  revealEnv();
}

function addLog(msg) { G.log.unshift(msg); if (G.log.length > 20) G.log.pop(); }

// ===== RENDER =====
function render() {
  const root = document.getElementById('root');
  if (!G.phase) { root.innerHTML = renderTitle(); return; }
  const screens = { title:renderTitle, setup:renderSetup, deal:renderDeal, env_reveal:renderEnvReveal, player_ready:renderPlayerReady, player_action:renderPlayerAction, player_damage:renderPlayerDamage, gameover:renderGameOver };
  root.innerHTML = (screens[G.phase] || renderTitle)();
  if (G.phase === 'setup') initNameFields();
  if (G.pendingCure && G.phase === 'player_action') appendCureModal();
}

function renderTitle() {
  return `<div class="screen center">
    <a href="/" class="back-link">← Tacorari</a>
    <div style="text-align:center;">
      <div class="title-emoji">🤧</div>
      <h1 class="game-title">アレルギーサバイバル</h1>
      <p class="title-sub">最後まで生き残れ！ 2〜4人対応</p>
      <div class="title-actions">
        <button class="btn btn-dark" onclick="G.phase='setup';render()">ゲームを始める</button>
        <button class="btn btn-outline" onclick="document.getElementById('rules').classList.toggle('hidden')">ルールを見る</button>
      </div>
    </div>
    <div id="rules" class="rules-box hidden" style="margin-top:24px;">
      <h3>ゲームの流れ</h3>
      <ol>
        <li>各プレイヤーにアレルギーカードが3枚配られる（体力10スタート）</li>
        <li>毎ターン、環境カードが1枚めくられる</li>
        <li>自分のアレルギーと環境が一致するとダメージを受ける</li>
        <li>ダメージを受ける人は対策カードを1枚ドローできる</li>
        <li>体力が0になったプレイヤーは脱落、最後の1人が勝ち！</li>
        <li>6ターンごとに全員アレルギーが1つ増える</li>
      </ol>
      <h3 style="margin-top:14px;">ダメージ計算</h3>
      <table class="rules-table">
        <tr><th>重症度</th><th>倍率</th><th>例（環境-2）</th></tr>
        <tr><td>軽度</td><td>×1</td><td>-2</td></tr>
        <tr><td>中度</td><td>×1.5</td><td>-3</td></tr>
        <tr><td>重度</td><td>×2</td><td>-4</td></tr>
      </table>
    </div>
  </div>`;
}

function renderSetup() {
  return `<div class="screen center">
    <div class="setup-box">
      <h2>プレイヤー設定</h2>
      <div class="setup-field">
        <label>プレイヤー数</label>
        <select id="pcount" onchange="initNameFields()">
          <option value="2">2人</option>
          <option value="3">3人</option>
          <option value="4">4人</option>
        </select>
      </div>
      <div id="name-fields"></div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button class="btn btn-outline" onclick="G.phase=null;render()">← 戻る</button>
        <button class="btn btn-dark" style="flex:1;" onclick="startFromSetup()">カードを配る →</button>
      </div>
    </div>
  </div>`;
}

function initNameFields() {
  const n = parseInt(document.getElementById('pcount')?.value || 2);
  const container = document.getElementById('name-fields');
  if (!container) return;
  container.innerHTML = Array.from({length:n}, (_,i) => `
    <div class="setup-field">
      <label>プレイヤー ${i+1}</label>
      <input type="text" id="pname${i}" placeholder="プレイヤー${i+1}" value="プレイヤー${i+1}">
    </div>`).join('');
}

function startFromSetup() {
  const n = parseInt(document.getElementById('pcount').value);
  const names = Array.from({length:n}, (_,i) => {
    const v = document.getElementById('pname'+i)?.value.trim();
    return v || `プレイヤー${i+1}`;
  });
  startGame(names);
}

function renderDeal() {
  const p = G.players[G.dealIdx];
  if (!G.dealShowing) {
    return `<div class="screen center">
      <div class="deal-box">
        <div class="deal-private">🙈</div>
        <div class="deal-title">端末を ${p.name} へ</div>
        <div class="deal-sub">他のプレイヤーは画面から目を離してください</div>
        <button class="btn btn-dark" onclick="ackDealReady()">準備できた →</button>
      </div>
    </div>`;
  }
  return `<div class="screen center">
    <div class="deal-box">
      <div class="deal-title">${p.name} のアレルギー</div>
      <div class="deal-sub">あなたの弱点です。他の人には見せないで！</div>
      <div class="cards-row">
        ${p.allergies.map(a => allergyCardHTML(a)).join('')}
      </div>
      <button class="btn btn-dark" onclick="ackDealDone()">確認した →</button>
    </div>
  </div>`;
}

function renderEnvReveal() {
  const e = G.currentEnvCard;
  const effectClass = !e.effects.length ? 'safe' : e.effects[0].cat === 'all' ? 'all' : '';
  const effectLabel = !e.effects.length
    ? '<span class="env-effect safe">ダメージなし</span>'
    : e.effects.map(ef => `<span class="env-effect ${ef.cat==='all'?'all':''}">${CAT_LABEL[ef.cat]} -${ef.dmg}</span>`).join(' ');

  return `<div class="screen">
    <span class="turn-badge">ターン ${G.turn}</span>
    <div class="section-label">今ターンの環境</div>
    <div class="env-card ${effectClass}">
      <div class="env-emoji">${e.emoji}</div>
      <div class="env-name">${e.name}</div>
      <div class="env-detail">${e.detail}</div>
      ${effectLabel}
    </div>
    <div class="section-label" style="margin-bottom:12px;">全プレイヤーの状態</div>
    ${playerSummaryHTML()}
    <button class="btn btn-dark" style="width:100%;margin-top:8px;" onclick="startPlayerTurns()">各プレイヤーのターン開始 →</button>
    ${logHTML()}
  </div>`;
}

function renderPlayerReady() {
  const p = G.players[G.currentPlayerIdx];
  return `<div class="screen center">
    <div class="ready-box">
      <div class="ready-emoji">👤</div>
      <div class="ready-name">${p.name} のターン</div>
      <div class="ready-sub">端末を ${p.name} へ渡してください</div>
      <button class="btn btn-dark" style="background:#fff;color:#1a1a1a;width:100%;" onclick="startPlayerAction()">準備できた →</button>
    </div>
  </div>`;
}

function renderPlayerAction() {
  const p = G.players[G.currentPlayerIdx];
  const e = G.currentEnvCard;
  const expectedDmg = calcDmg(p, e, []);
  const curDmg  = calcDmg(p, e, G.usedCards);
  const curHeal = calcHeal(G.usedCards);
  const net = curHeal - curDmg;

  const alertHtml = expectedDmg > 0
    ? `<div class="alert-box dmg">⚠️ この環境であなたはダメージを受けます。対策カードを使いましょう。</div>`
    : `<div class="alert-box safe">✓ この環境はあなたに影響しません。</div>`;

  return `<div class="screen">
    <span class="turn-badge">ターン ${G.turn} · ${p.name}</span>
    <div style="display:flex;align-items:flex-end;gap:16px;margin-bottom:16px;">
      <div>
        <div class="hp-text">${p.hp}<span style="font-size:16px;color:#aaa;font-weight:400;">/${p.maxHp}</span></div>
        <div class="hp-label">HP</div>
        <div class="hp-bar-wrap" style="width:160px;margin-top:6px;">
          <div class="hp-bar-fill" style="width:${p.hp/p.maxHp*100}%;background:${hpColor(p.hp,p.maxHp)};"></div>
        </div>
      </div>
    </div>

    <div class="section-label">現在の環境</div>
    <div style="background:#eff6ff;border:1.5px solid #93c5fd;border-radius:6px;padding:12px 16px;margin-bottom:16px;display:flex;gap:12px;align-items:center;">
      <span style="font-size:28px;">${e.emoji}</span>
      <div>
        <div style="font-weight:700;font-size:15px;">${e.name}</div>
        <div style="font-size:12px;color:#666;font-family:'DM Sans',sans-serif;">${e.effects.length?e.effects.map(ef=>CAT_LABEL[ef.cat]+' -'+ef.dmg).join(' / '):'ダメージなし'}</div>
      </div>
    </div>

    ${alertHtml}

    <div class="section-label">あなたのアレルギー（${p.allergies.length}枚）</div>
    <div class="cards-row" style="margin-bottom:16px;">
      ${p.allergies.length ? p.allergies.map(a => allergyCardHTML(a)).join('') : '<p style="font-size:14px;color:#aaa;font-family:\'DM Sans\',sans-serif;">アレルギーなし</p>'}
    </div>

    <div class="section-label">手札（${p.hand.length}枚）— クリックで使用選択</div>
    <div class="cards-row" style="margin-bottom:16px;">
      ${p.hand.length ? p.hand.map(c => counterCardHTML(c)).join('') : '<p style="font-size:14px;color:#aaa;font-family:\'DM Sans\',sans-serif;">対策カードなし</p>'}
    </div>

    <div class="dmg-preview">
      <div class="row"><span>ダメージ予測</span><span class="dmg-red">${curDmg > 0 ? '-'+curDmg : '0'}</span></div>
      <div class="row"><span>回復予測</span><span class="dmg-green">${curHeal > 0 ? '+'+curHeal : '0'}</span></div>
      <div class="row total">
        <span>HP変化</span>
        <span style="color:${net>=0?'#16a34a':'#dc2626'}">${net>=0?'+':''}${net}</span>
      </div>
    </div>

    <button class="btn btn-dark" style="width:100%;" onclick="confirmTurn()">ターン終了 →</button>
  </div>`;
}

function renderPlayerDamage() {
  const p = G.players[G.currentPlayerIdx];
  const dmg = G._lastDamage || 0;
  const heal = G._lastHeal || 0;
  const net = heal - dmg;
  const bigNum = net === 0 ? '±0' : (net > 0 ? '+'+net : ''+net);
  const bigClass = net > 0 ? 'good' : net < 0 ? 'bad' : 'neutral';
  const isEliminated = !p.isAlive;

  return `<div class="screen">
    <span class="turn-badge">ターン ${G.turn} · ${p.name} の結果</span>
    <div class="dmg-result">
      <div class="dmg-big ${bigClass}">${bigNum}</div>
      <div style="font-size:14px;color:#888;margin-top:8px;font-family:'DM Sans',sans-serif;">
        ${dmg > 0 ? `ダメージ -${dmg}` : ''}${heal > 0 ? ` 回復 +${heal}` : ''}${!dmg && !heal ? 'ダメージなし' : ''}
      </div>
      <div style="margin-top:16px;">
        <div class="hp-text">${isEliminated ? '0' : p.hp}</div>
        <div class="hp-label">残りHP</div>
        <div class="hp-bar-wrap" style="width:200px;margin:8px auto 0;">
          <div class="hp-bar-fill" style="width:${Math.max(0,p.hp)/p.maxHp*100}%;background:${hpColor(Math.max(0,p.hp),p.maxHp)};"></div>
        </div>
      </div>
      ${isEliminated ? `<div style="margin-top:16px;font-size:20px;">😵 ${p.name}は脱落しました...</div>` : ''}
    </div>
    <button class="btn btn-dark" style="width:100%;" onclick="nextInQueue()">次のプレイヤーへ →</button>
    ${logHTML()}
  </div>`;
}

function renderGameOver() {
  const w = G.winner;
  return `<div class="screen center">
    <div class="gameover-box">
      <div class="winner-emoji">🏆</div>
      <div class="winner-name">${w ? w.name : '全員脱落...'}</div>
      <div class="winner-sub">${w ? 'が最後まで生き残った！' : '同時に全員脱落しました'}</div>
      <div class="final-scores">
        <div class="section-label">最終結果</div>
        ${G.players.map(p => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e5e5e0;font-size:15px;">
            <span>${p === w ? '🏆 ' : p.isAlive ? '' : '💀 '}${p.name}</span>
            <span style="font-weight:700;color:${p.isAlive?'#16a34a':'#dc2626'}">HP ${Math.max(0,p.hp)}</span>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button class="btn btn-dark" onclick="G.phase='setup';render()">もう一度プレイ</button>
        <button class="btn btn-outline" onclick="G.phase=null;render()">タイトルへ</button>
      </div>
    </div>
  </div>`;
}

// ===== UI HELPERS =====
function allergyCardHTML(a) {
  return `<div class="allergy-card" style="background:${SEV_BG[a.severity]};border-color:${SEV_BORDER[a.severity]};">
    <div class="ac-emoji">${a.emoji}</div>
    <div class="ac-name" style="color:${SEV_TEXT[a.severity]};">${a.name}</div>
    <span class="ac-badge" style="background:${SEV_BORDER[a.severity]};color:#fff;">${SEV_LABEL[a.severity]}</span>
  </div>`;
}

function counterCardHTML(c) {
  const isSelected = G.usedCards.some(u => u.id === c.id);
  return `<div class="counter-card ${isSelected?'selected':''}" onclick="toggleCard('${c.id}')">
    ${isSelected ? '<div class="cc-check">✓</div>' : ''}
    <div class="cc-emoji">${c.emoji}</div>
    <div class="cc-name">${c.name}</div>
    <div class="cc-desc">${c.desc}</div>
  </div>`;
}

function playerSummaryHTML() {
  return `<div class="player-summary-row">
    ${G.players.map((p,i) => `
      <div class="player-chip ${!p.isAlive?'dead':''}">
        <div class="chip-name">${p.isAlive?'':'💀 '}${p.name}</div>
        <div class="chip-hp" style="color:${hpColor(p.hp,p.maxHp)};">${p.hp}</div>
        <div class="hp-bar-wrap">
          <div class="hp-bar-fill" style="width:${p.hp/p.maxHp*100}%;background:${hpColor(p.hp,p.maxHp)};"></div>
        </div>
      </div>`).join('')}
  </div>`;
}

function logHTML() {
  if (!G.log.length) return '';
  return `<div class="log-box" style="margin-top:20px;">
    ${G.log.slice(0,8).map(l => `<div class="log-entry">${l}</div>`).join('')}
  </div>`;
}

function appendCureModal() {
  const p = G.players[G.currentPlayerIdx];
  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.innerHTML = `<div class="modal-box">
    <h3>⚕️ どのアレルギーを治療しますか？</h3>
    <div class="cards-row" style="justify-content:flex-start;margin-bottom:20px;">
      ${p.allergies.map(a => `
        <div onclick="applyCure('${a.id}')" style="cursor:pointer;">
          ${allergyCardHTML(a)}
        </div>`).join('')}
    </div>
    <button class="btn btn-outline btn-sm" onclick="G.pendingCure=false;render()">キャンセル</button>
  </div>`;
  document.body.appendChild(modal);
}

// ===== INIT =====
render();
</script>
</body>
</html>
